services:
  - type: web
    name: medlink-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python seed.py && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: SECRET_KEY
        generateValue: true
    plan: free
